# ============================================
# RAVSS Testing Config (for New Dataset)
# ============================================

seed: 42
batch_size: 1

optimizer: Adam
optimizer_args:
    lr: 0.00015
    amsgrad: True

epochs: 200
epoch_length: 2
outputpath: experiments_new_dataset_test
model: AV_test_RAVSS

# ---- Dataset settings ----
# train_scp: create_mix/mix_2_spk_tr.scp
# val_scp: create_mix/mix_2_spk_cv.scp
# test_scp: create_mix/mix_2_spk_tt.scp
dataset_root_path: /path/to/data-bin/data-bin/train  # Path to the 'train' folder containing session_00, etc.
mix_num: 2       # Number of speakers to mix
target_num: 2    # model separates 2 sources

# ---- Loss & Evaluation ----
loss: SI_SNR_PIT
val_loss: SI_SNR
pesq: PESQ

# ---- Training Setup ----
n_saved: 1
num_workers: 6
validate_every: 1
with_amp: False
backend: nccl
nproc_per_node: 4

# ---- Testing / Resume ----
# (update these after training)
test_cdp:        # path to your trained checkpoint
resume_from:     # same as above if you want to resume or evaluate
