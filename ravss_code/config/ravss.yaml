# ============================================
# RAVSS Training Config (for New Dataset)
# ============================================

seed: 42
batch_size: 1

optimizer: Adam
optimizer_args:
    lr: 0.00015
    amsgrad: True

epochs: 200
epoch_length: 2
outputpath: experiments_new_dataset
model: AV_8_Sepformer

# ---- Dataset settings ----
# train_scp: create_mix/mix_2_spk_tr.scp
# val_scp: create_mix/mix_2_spk_cv.scp
# test_scp: create_mix/mix_2_spk_tt.scp
dataset_root_path: /path/to/AVSS/data-bin/train  # Update this to your absolute path, e.g., /home/youruser/AVSS/data-bin/train
mix_num: 2       # Number of speakers to mix

# ---- Loss & Evaluation ----
loss: SI_SNR_PIT
val_loss: SI_SNR
pesq: PESQ

# ---- Training Setup ----
n_saved: 1
num_workers: 6
validate_every: 1
with_amp: False
backend: nccl
nproc_per_node: 4
